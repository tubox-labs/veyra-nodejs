name: Bug report
description: Report a reproducible bug in the SDK
title: "bug: <short description>"
labels:
  - bug
body:
  - type: markdown
    attributes:
      value: |
        Please provide enough detail to reproduce the issue.
  - type: input
    id: sdk_version
    attributes:
      label: SDK version
      placeholder: 1.0.0
    validations:
      required: true
  - type: input
    id: runtime
    attributes:
      label: Runtime
      placeholder: Node 20 / Bun / Deno / CF Workers
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Reproduction
      description: Minimal code snippet or steps
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual behavior
    validations:
      required: true
