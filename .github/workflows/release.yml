name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      run_live_smoke:
        description: "Run live smoke test before release"
        required: false
        default: true
        type: boolean
      publish_npm:
        description: "Publish package to npm"
        required: false
        default: true
        type: boolean

permissions:
  contents: write
  id-token: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  verify:
    name: Verify Release Candidate
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Run all quality gates
        run: npm run ci:all

  live_smoke:
    name: Live Smoke Test
    runs-on: ubuntu-latest
    needs: verify
    if: >-
      secrets.VEYRA_API_KEY != '' &&
      (github.event_name == 'push' || inputs.run_live_smoke == true)
    env:
      VEYRA_API_KEY: ${{ secrets.VEYRA_API_KEY }}
      VEYRA_BASE_URL: ${{ secrets.VEYRA_BASE_URL }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Run live smoke test
        run: npm run smoke:live

  github_release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: [verify, live_smoke]
    if: >-
      always() &&
      needs.verify.result == 'success' &&
      (needs.live_smoke.result == 'success' || needs.live_smoke.result == 'skipped')
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Package tarball
        run: npm pack

      - name: Publish GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          generate_release_notes: true
          files: |
            *.tgz

  publish_npm:
    name: Publish to npm
    runs-on: ubuntu-latest
    needs: github_release
    permissions:
      contents: read
      id-token: write
    if: >-
      needs.github_release.result == 'success' &&
      secrets.NPM_TOKEN != '' &&
      (github.event_name == 'push' || inputs.publish_npm == true)
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          registry-url: https://registry.npmjs.org
          cache: npm

      - name: Install
        run: npm ci

      - name: Build
        run: npm run build

      - name: Publish package
        run: npm publish --provenance --access public
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
