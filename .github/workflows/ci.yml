name: CI

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  quality:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install
        run: npm ci

      - name: Type check
        run: npm run typecheck

      - name: Lint
        run: npm run lint

      - name: Format check
        run: npx prettier --check src tests docs examples

      - name: Tests + coverage
        run: npm test

      - name: Build
        run: npm run build

      - name: Verify CJS export
        run: node -e "const v=require('./dist/index.cjs'); console.assert(typeof v.Veyra==='function')"

      - name: Verify ESM export
        run: node --input-type=module -e "import Veyra from './dist/index.mjs'; console.assert(typeof Veyra==='function')"
